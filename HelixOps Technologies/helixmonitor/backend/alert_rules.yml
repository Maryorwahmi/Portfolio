# Alert Rules for HelixMonitor
# Created by CaptainCode - HelixOps Technologies

groups:
  - name: helixmonitor_alerts
    interval: 15s
    rules:
      # CPU Usage Alerts
      - alert: HighCPUUsage
        expr: 'node_cpu_seconds_total > 85'
        for: 5m
        labels:
          severity: warning
          service_type: infrastructure
        annotations:
          summary: "High CPU usage detected on {{ $labels.instance }}"
          description: "CPU usage is {{ $value }}% (threshold: 85%)"

      - alert: CriticalCPUUsage
        expr: 'node_cpu_seconds_total > 95'
        for: 2m
        labels:
          severity: critical
          service_type: infrastructure
        annotations:
          summary: "Critical CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value }}% (threshold: 95%)"

      # Memory Usage Alerts
      - alert: HighMemoryUsage
        expr: 'node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.2'
        for: 5m
        labels:
          severity: warning
          service_type: infrastructure
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Available memory is {{ $value | humanizePercentage }}"

      - alert: CriticalMemoryUsage
        expr: 'node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.1'
        for: 2m
        labels:
          severity: critical
          service_type: infrastructure
        annotations:
          summary: "Critical memory usage on {{ $labels.instance }}"
          description: "Available memory is {{ $value | humanizePercentage }}"

      # Disk Usage Alerts
      - alert: HighDiskUsage
        expr: '(1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)) > 0.8'
        for: 10m
        labels:
          severity: warning
          service_type: infrastructure
        annotations:
          summary: "High disk usage on {{ $labels.instance }}"
          description: "Disk {{ $labels.device }} is {{ $value | humanizePercentage }} full"

      - alert: CriticalDiskUsage
        expr: '(1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)) > 0.9'
        for: 5m
        labels:
          severity: critical
          service_type: infrastructure
        annotations:
          summary: "Critical disk usage on {{ $labels.instance }}"
          description: "Disk {{ $labels.device }} is {{ $value | humanizePercentage }} full"

      # Service Down Alerts
      - alert: ServiceDown
        expr: 'up == 0'
        for: 1m
        labels:
          severity: critical
          service_type: application
        annotations:
          summary: "Service is down - {{ $labels.job }}"
          description: "Service {{ $labels.job }} on {{ $labels.instance }} is unreachable"

      # HTTP Request Latency Alerts
      - alert: HighHTTPLatency
        expr: 'http_request_duration_seconds > 1'
        for: 5m
        labels:
          severity: warning
          service_type: application
        annotations:
          summary: "High HTTP latency detected"
          description: "HTTP request duration is {{ $value }}s (threshold: 1s)"

      # Error Rate Alerts
      - alert: HighErrorRate
        expr: 'rate(http_requests_total{status=~"5.."}[5m]) > 0.05'
        for: 5m
        labels:
          severity: warning
          service_type: application
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      # Prometheus Down Alert
      - alert: PrometheusDown
        expr: 'up{job="prometheus"} == 0'
        for: 1m
        labels:
          severity: critical
          service_type: monitoring
        annotations:
          summary: "Prometheus is down"
          description: "Prometheus monitoring service is unreachable"
