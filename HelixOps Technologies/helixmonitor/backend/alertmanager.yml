# AlertManager Configuration for HelixMonitor
# Created by CaptainCode - HelixOps Technologies

global:
  resolve_timeout: 5m
  slack_api_url: '${SLACK_WEBHOOK_URL}'

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 5m
    - match:
        severity: warning
      receiver: 'warning'
      repeat_interval: 1h

receivers:
  - name: 'default'
    email_configs:
      - to: 'ops@helixops.com'
        from: 'alerts@helixops.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'alerts@helixops.com'
        auth_password: '${SMTP_PASSWORD}'
        headers:
          Subject: '[{{ .GroupLabels.alertname }}] {{ .Status }}'

  - name: 'critical'
    email_configs:
      - to: 'critical@helixops.com'
        from: 'alerts@helixops.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'alerts@helixops.com'
        auth_password: '${SMTP_PASSWORD}'
    slack_configs:
      - channel: '#critical-alerts'
        title: 'Critical Alert'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: 'warning'
    email_configs:
      - to: 'ops@helixops.com'
        from: 'alerts@helixops.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'alerts@helixops.com'
        auth_password: '${SMTP_PASSWORD}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']
