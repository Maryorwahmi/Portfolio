# Prometheus Configuration for HelixMonitor
# Created by CaptainCode - HelixOps Technologies

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'helixmonitor'
    environment: 'production'

# Prometheus AlertManager config
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

# Load alerting rules
rule_files:
  - '/etc/prometheus/alert_rules.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter for system metrics
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'node_(cpu|memory|disk|network).*'
        action: keep

  # API Service metrics
  - job_name: 'api-service'
    scrape_interval: 10s
    static_configs:
      - targets: ['localhost:8000']
        labels:
          service_id: 'api-service-1'
          service_type: 'api'

  # Worker Service metrics
  - job_name: 'worker-service'
    scrape_interval: 15s
    static_configs:
      - targets: ['localhost:8001']
        labels:
          service_id: 'worker-service-1'
          service_type: 'worker'

  # Database metrics (if using postgres_exporter)
  - job_name: 'database'
    static_configs:
      - targets: ['localhost:9187']
        labels:
          service_id: 'postgres-1'
          service_type: 'database'

  # Custom exporter for application metrics
  - job_name: 'custom_exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:8002']
        labels:
          service_id: 'custom-app'
